<!doctype html>
<html><head><meta charset="utf-8"><title>arcade-ai studio</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body, iframe { width: 100%; height: 100%; border: 0; display: block; }
</style>
</head>
<body>
<iframe id="mc" src="https://arcade.makecode.com/?controller=1"
  sandbox="allow-popups allow-forms allow-scripts allow-same-origin"
  allow="autoplay; gamepad; midi"></iframe>
<script>
const iframe = document.getElementById('mc');

window.addEventListener('message', async (event) => {
  if (event.source !== iframe.contentWindow) return;
  const msg = event.data; if (!msg) return;

  if (msg.type === 'pxthost' && msg.action === 'workspacesync') {
    const data = await (await fetch('/api/project')).json();
    msg.projects = [{
      header: {
        id: 'arcade-ai-project', name: 'arcade-game',
        modificationTime: Date.now(), recentUse: Date.now(),
        target: 'arcade', editor: 'tsprj'
      },
      text: data.files
    }];
    iframe.contentWindow.postMessage(msg, '*');
  }

  if (msg.type === 'pxthost' && msg.action === 'workspacesave') {
    const project = msg.project;
    if (project && project.text) {
      await fetch('/api/save', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ files: project.text })
      });
    }
  }

  if (msg.type === 'pxthost' && msg.action === 'editorcontentloaded') {
    clearTimeout(window.__compileTimer);
    window.__compileTimer = setTimeout(() => {
      fetch('/api/compile-result', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ success: false, reason: 'timeout: no run message within 30s' })
      });
    }, 30000);
  }

  if (msg.type === 'run') {
    clearTimeout(window.__compileTimer);
    fetch('/api/compile-result', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ success: true })
    });
  }
});

const es = new EventSource('/events');
es.onmessage = (e) => {
  if (e.data === 'changed') iframe.src = iframe.src;
};
</script>
</body>
</html>
